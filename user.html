<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savor — Browse Menu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-wrapper" id="toastWrapper"></div>

  <!-- Navbar -->
  <nav class="savor-navbar">
    <a class="navbar-brand-logo" href="#">
      <i class="bi bi-egg-fried"></i>
      <span>Savor</span>
    </a>

    <div class="navbar-search" id="navSearch">
      <i class="bi bi-search"></i>
      <input type="text" id="searchInput" placeholder="Search the menu…" autocomplete="off">
    </div>

    <div class="navbar-actions">
      <button class="nav-pill-btn" id="viewProductsTab"><i class="bi bi-grid"></i> Menu</button>
      <button class="nav-pill-btn" id="myOrdersTab"><i class="bi bi-receipt"></i> My Orders</button>
      <button class="nav-pill-btn" id="myProfileTab"><i class="bi bi-person"></i> Profile</button>
      <button class="cart-btn-nav" id="cartBtn">
        <i class="bi bi-bag"></i> Cart
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="avatar-btn" id="logoutBtn" title="Logout"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="page-container" id="mainContent">
    <!-- Dynamically loaded -->
  </div>

  <!-- Cart Overlay + Drawer -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <span class="cart-drawer-title">Your Cart</span>
      <button class="cart-close-btn" id="cartCloseBtn"><i class="bi bi-x"></i></button>
    </div>
    <div class="cart-items-list" id="cartItemsList"></div>
    <div class="cart-drawer-footer">
      <div class="cart-summary">
        <div class="cart-row"><span>Subtotal</span><span id="cartSubtotal">₹0.00</span></div>
        <div class="cart-row"><span>Service charge (5%)</span><span id="cartTax">₹0.00</span></div>
        <div class="cart-row total"><span>Total</span><span id="cartTotal">₹0.00</span></div>
      </div>
      <button class="btn-place-order" id="placeOrderBtn">
        <i class="bi bi-check-circle"></i> Place Order
      </button>
    </div>
  </aside>

  <!-- Review Modal -->
  <div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">Leave a Review</span>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-3" style="font-size:.85rem;">How was your experience with this order?</p>
          <div class="star-rating" id="starRating">
            <button class="star-btn" data-val="1">★</button>
            <button class="star-btn" data-val="2">★</button>
            <button class="star-btn" data-val="3">★</button>
            <button class="star-btn" data-val="4">★</button>
            <button class="star-btn" data-val="5">★</button>
          </div>
          <textarea class="admin-input" id="reviewText" rows="3" placeholder="Share your experience…" style="resize:none;"></textarea>
          <input type="hidden" id="reviewOrderId">
        </div>
        <div class="modal-footer">
          <button class="btn-admin-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-admin-primary" id="submitReviewBtn"><i class="bi bi-send"></i> Submit Review</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/user.js"></script>
</body>
</html>

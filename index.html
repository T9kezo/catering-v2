<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savor — Catering Reservation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

  <!-- Toast Container -->
  <div class="toast-wrapper" id="toastWrapper"></div>

  <div class="auth-layout">

    <!-- Left: Hero Panel -->
    <div class="auth-hero">
      <div class="auth-hero-food-art">
        <div class="food-blob"></div>
        <div class="food-blob"></div>
        <div class="food-blob"></div>
      </div>
      <div class="auth-hero-content">
        <div class="brand-logo">
          <i class="bi bi-egg-fried"></i>
          <span>Savor</span>
        </div>
        <h1 class="hero-title">
          Exceptional<br>
          Catering<br>
          <em>Experiences</em>
        </h1>
        <p class="hero-subtitle">
          From intimate gatherings to grand celebrations, we bring culinary artistry to every occasion.
        </p>
        <div class="hero-stats">
          <div class="hero-stat">
            <span class="stat-num">500+</span>
            <span class="stat-label">Events Catered</span>
          </div>
          <div class="hero-stat">
            <span class="stat-num">50+</span>
            <span class="stat-label">Menu Items</span>
          </div>
          <div class="hero-stat">
            <span class="stat-num">4.9★</span>
            <span class="stat-label">Avg Rating</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Auth Form -->
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">
        <h2 class="auth-form-title">Welcome back</h2>
        <p class="auth-form-subtitle">Sign in or create an account to get started</p>

        <ul class="nav nav-pills auth-tabs mb-4" id="authTabs" role="tablist">
          <li class="nav-item flex-fill" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Sign In</button>
          </li>
          <li class="nav-item flex-fill" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">Create Account</button>
          </li>
        </ul>

        <div class="tab-content" id="authTabsContent">

          <!-- Login -->
          <div class="tab-pane fade show active" id="login" role="tabpanel">
            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group-custom">
                  <i class="bi bi-envelope input-icon"></i>
                  <input type="email" class="form-control-custom" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="invalid-feedback" id="loginEmailError"></div>
              </div>
              <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group-custom">
                  <i class="bi bi-lock input-icon"></i>
                  <input type="password" class="form-control-custom" id="loginPassword" placeholder="••••••••" required>
                  <button type="button" class="btn-toggle-password" data-target="loginPassword"><i class="bi bi-eye"></i></button>
                </div>
              </div>
              <div id="confirmationMessage" class="alert alert-warning rounded-3 d-none mb-3">
                <i class="bi bi-envelope-exclamation me-2"></i>
                Email not confirmed.
                <button id="resendBtn" class="btn btn-sm btn-warning ms-2">Resend</button>
              </div>
              <button type="submit" class="btn-primary-custom w-100" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="btn-spinner d-none"><span class="spinner-border spinner-border-sm" role="status"></span></span>
              </button>
            </form>
          </div>

          <!-- Register -->
          <div class="tab-pane fade" id="register" role="tabpanel">
            <form id="registerForm" novalidate>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group-custom">
                  <i class="bi bi-envelope input-icon"></i>
                  <input type="email" class="form-control-custom" id="registerEmail" placeholder="you@example.com" required>
                </div>
                <div class="invalid-feedback" id="registerEmailError"></div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group-custom">
                  <i class="bi bi-lock input-icon"></i>
                  <input type="password" class="form-control-custom" id="registerPassword" placeholder="Min. 8 characters" required>
                  <button type="button" class="btn-toggle-password" data-target="registerPassword"><i class="bi bi-eye"></i></button>
                </div>
                <div class="password-strength mt-2" id="passwordStrength">
                  <div class="strength-bar"></div>
                  <div class="strength-bar"></div>
                  <div class="strength-bar"></div>
                  <div class="strength-bar"></div>
                </div>
                <div class="invalid-feedback" id="registerPasswordError"></div>
              </div>

              <!-- Admin toggle (hidden by default) -->
              <div class="admin-toggle-row">
                <input class="form-check-input" type="checkbox" id="isAdminToggle">
                <label for="isAdminToggle">Registering as an admin?</label>
              </div>
              <div class="admin-code-row d-none" id="adminCodeSection">
                <label class="form-label">Admin Invite Code</label>
                <div class="input-group-custom">
                  <i class="bi bi-shield-lock input-icon"></i>
                  <input type="text" class="form-control-custom" id="adminCode" placeholder="Enter your invite code">
                </div>
                <div class="invalid-feedback" id="adminCodeError"></div>
              </div>

              <button type="submit" class="btn-primary-custom w-100 mt-3" id="registerBtn">
                <span class="btn-text">Create Account</span>
                <span class="btn-spinner d-none"><span class="spinner-border spinner-border-sm" role="status"></span></span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
